version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cbbreward-postgres
    environment:
      POSTGRES_DB: cbbreward_dst
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cbbreward_dst"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cbbreward-app
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
